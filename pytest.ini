[pytest]
# Tell pytest where to find tests
testpaths = tests

# File, class and function naming conventions
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default options applied to every run:
# --tb=short    — concise tracebacks, easier to scan in CI logs
# --html        — generate HTML report after every run
# --self-contained-html — bundle CSS/JS into the HTML so it opens anywhere
# -v            — verbose output so each test name is visible in the terminal
addopts =
    --tb=short
    --html=reports/report.html
    --self-contained-html
    -v

# Show live log output during the run — useful for debugging
log_cli = true
log_cli_level = INFO
